<div class="settings-card">

  <div class="card-header">
    <div>
      <h2 class="card-title">Seguridad</h2>
      <p class="card-desc">Cambia tu contraseña de acceso</p>
    </div>
  </div>

  <div class="card-section">
    <div class="section-label">Contraseña</div>
    <div class="section-fields">
      <app-input
        label="Contraseña actual"
        type="password"
        [value]="current()"
        (valueChange)="current.set($event)"
      />
      <div class="field-row">
        <app-input
          label="Nueva contraseña"
          type="password"
          [value]="newPass()"
          (valueChange)="newPass.set($event)"
        />
        <app-input
          label="Confirmar contraseña"
          type="password"
          [value]="confirmNew()"
          (valueChange)="confirmNew.set($event)"
        />
      </div>
    </div>
  </div>

  <div class="card-footer">
    @if (error()) {
      <span class="error-msg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error() }}
      </span>
    }
    @if (success()) {
      <span class="success-msg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Contraseña actualizada
      </span>
    }
    <app-button label="Cambiar contraseña" variant="primary" size="sm" [loading]="saving()" (clicked)="save()" />
  </div>

</div>
