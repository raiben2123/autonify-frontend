<div class="flex flex-col items-center justify-center py-16 px-4 text-center">
  @if (icon()) {
    <div class="size-12 text-text-3 mb-4" [innerHTML]="icon()"></div>
  }
  <h3 class="text-base font-medium text-text mb-1">{{ title() }}</h3>
  @if (subtitle()) {
    <p class="text-sm text-text-2 max-w-sm">{{ subtitle() }}</p>
  }
  <div class="mt-6">
    <ng-content />
  </div>
</div>
