<button
  [type]="type()"
  [class]="classes"
  [disabled]="disabled() || loading()"
  (click)="clicked.emit()"
>
  @if (loading()) {
    <span class="size-4 border-2 border-current border-t-transparent rounded-full animate-spin"></span>
  }

  @if (icon() && iconPos() === 'left' && !loading()) {
    <span class="size-4" [innerHTML]="icon()"></span>
  }

  @if (label()) {
    <span>{{ label() }}</span>
  } @else {
    <ng-content></ng-content>
  }

  @if (icon() && iconPos() === 'right' && !loading()) {
    <span class="size-4" [innerHTML]="icon()"></span>
  }
</button>
