<label
  class="flex items-start gap-3 cursor-pointer group"
  [class.opacity-50]="disabled()"
  [class.cursor-not-allowed]="disabled()"
  (click)="toggle()"
>
  <span
    class="mt-0.5 flex-shrink-0 size-4 rounded border transition-colors duration-150 flex items-center justify-center"
    [class]="
      checked()
        ? 'bg-primary border-primary'
        : 'bg-surface border-border-2 group-hover:border-primary'
    "
  >
    @if (checked()) {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="10"
        height="10"
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="20 6 9 17 4 12" />
      </svg>
    }
  </span>

  <span class="flex flex-col gap-0.5">
    @if (label()) {
      <span class="text-sm text-text">{{ label() }}</span>
    }
    @if (hint()) {
      <span class="text-xs text-text-3">{{ hint() }}</span>
    }
  </span>
</label>
