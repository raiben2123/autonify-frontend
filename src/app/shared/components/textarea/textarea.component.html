<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label class="text-sm font-medium text-text">
      {{ label() }}
      @if (required()) {
        <span class="text-danger ml-0.5">*</span>
      }
    </label>
  }

  <div class="relative">
    <textarea
      [class]="classes"
      [rows]="rows()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [maxLength]="maxlength() ?? 99999"
      (input)="onInput($event)"
      (blur)="blurred.emit()"
      >{{ value() }}</textarea
    >

    @if (maxlength()) {
      <span class="absolute bottom-2 right-3 text-xs text-text-3">
        {{ value().length }}/{{ maxlength() }}
      </span>
    }
  </div>

  @if (error()) {
    <p class="text-xs text-danger">{{ error() }}</p>
  } @else if (hint()) {
    <p class="text-xs text-text-3">{{ hint() }}</p>
  }
</div>
